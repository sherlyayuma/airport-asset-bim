<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minangkabau Airport - Scan Aset</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style-mobile.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="dashboard-body">

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-brand">
            <div class="logo-circle">
                <img src="assets/logo-injourney.png" alt="Injourney Logo">
            </div>
            <div class="brand-text">
                <h3 style="color: #111827; font-size: 0.9rem; font-weight: 700;">Minangkabau <br> Airport</h3>
            </div>
        </div>

        <ul class="nav-links">
            <li>
                <a href="dashboard.html">
                    <i class="ph ph-squares-four"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="data-aset.html">
                    <i class="ph ph-cube"></i>
                    <span>Data Aset</span>
                </a>
            </li>
            <li>
                <a href="laporan-aset.html">
                    <i class="ph ph-file-text"></i>
                    <span>Laporan Aset</span>
                </a>
            </li>
            <li class="active">
                <a href="#">
                    <i class="ph ph-scan"></i>
                    <span>Scan Aset</span>
                </a>
            </li>
            <li>
                <a href="cetak-qr.html">
                    <i class="ph ph-qr-code"></i>
                    <span>Cetak QR</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <button id="logout-btn" class="logout-link">
                <i class="ph ph-sign-out"></i>
                <span>Logout</span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="top-header">
            <button id="menu-toggle" class="menu-toggle-btn">
                <i class="ph ph-list"></i>
            </button>
            <div class="header-logos">
                <div class="logo-circle">
                    <img src="assets/logo-minangkabau.jpg" alt="Logo MIA">
                </div>
            </div>
            <div class="brand-text-container">
                <h2>Scan Aset Bandara</h2>
                <p class="subtitle">Arahkan kamera ke barcode aset untuk identifikasi, verifikasi lokasi, dan
                    pembaruan status pemeliharaan.</p>
            </div>
            <div class="header-right">
            </div>
        </header>

        <!-- Scan Layout -->
        <div class="scan-layout" style="grid-template-columns: 1fr;">
            <!-- Left: Camera Viewport -->
            <div class="camera-card">
                <div class="camera-viewport"
                    style="aspect-ratio: 1/1; max-width: 400px; margin: 0 auto; border-radius: 12px; overflow: hidden; position: relative; background: #000; display: flex; flex-direction: column; justify-content: center;">
                    <button class="btn-scan-main" style="z-index: 10; align-self: center;">
                        <i class="ph-fill ph-scan"></i>
                        <span>Mulai Scan</span>
                    </button>
                    <!-- Placeholder/Status -->
                    <div
                        style="position: absolute; top: 10px; left: 10px; z-index: 5; color: white; display: flex; align-items: center; gap: 6px; font-size: 12px; background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 4px;">
                        <span style="width: 8px; height: 8px; background: #4caf50; border-radius: 50%;"></span> SYSTEM
                        ONLINE
                    </div>
                </div>
            </div>

            <!-- Right: Result Card REMOVED -->
        </div>

        <!-- Search Bar REMOVED -->

        <!-- History Table REMOVED -->

    </main>

    <script src="script.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script>
        // Check Auth
        if (!localStorage.getItem('token')) {
            window.location.href = 'index.html';
        }
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        });

        // Toast Notification Logic
        function showToast(message, type = 'success') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            // Simple icon selection
            const iconClass = type === 'success' ? 'ph-check-circle' : 'ph-warning-circle';

            toast.innerHTML = `
                <i class="ph-fill ${iconClass}" style="font-size: 20px; margin-right: 8px;"></i>
                <span>${message}</span>
            `;

            container.appendChild(toast);

            // Trigger animation
            requestAnimationFrame(() => toast.classList.add('show'));

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Scanner Logic
        let html5QrcodeScanner = null;
        const startBtn = document.querySelector('.btn-scan-main');
        const cameraViewport = document.querySelector('.camera-viewport');

        if (startBtn) {
            startBtn.addEventListener('click', async () => {
                // Hide button, show scanner area if needed, or just overlay
                // We need a container ID for the scanner. 
                // Existing layout has .camera-viewport. Let's append a div or use an existing one.
                // Best to create a dedicated div inside camera-viewport replacing the placeholder stuff

                // Clear viewport content mostly, or hide content
                cameraViewport.innerHTML = '<div id="reader" style="width: 100%; height: 100%;"></div>';

                html5QrcodeScanner = new Html5Qrcode("reader");

                const config = { fps: 10, qrbox: { width: 250, height: 250 } };

                try {
                    await html5QrcodeScanner.start(
                        { facingMode: "environment" },
                        config,
                        onScanSuccess,
                        onScanFailure
                    );
                    showToast('Kamera aktif', 'success');
                } catch (err) {
                    console.error(err);
                    showToast('Gagal membuka kamera: ' + err, 'error');
                    // Restore UI?
                    setTimeout(() => location.reload(), 2000);
                }
            });
        }

        // Handle Scan Success
        let isProcessing = false;
        async function onScanSuccess(decodedText, decodedResult) {
            if (isProcessing) return;
            isProcessing = true;

            console.log(`Code matched = ${decodedText}`, decodedResult);

            // Extract ID if decodedText is a URL
            let assetId = decodedText;
            try {
                // Check if it's a URL
                if (decodedText.startsWith('http') || decodedText.startsWith('www')) {
                    const url = new URL(decodedText);
                    const idParam = url.searchParams.get('id');
                    if (idParam) {
                        assetId = idParam;
                    }
                }
            } catch (e) {
                console.log('Not a URL or failed to parse, using raw text:', e);
            }

            try {
                const response = await fetch(`/api/assets/view/${assetId}`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} - ${response.statusText}`);
                }

                const result = await response.json();

                if (result.success) {
                    // Found! Redirect.
                    showToast('Aset ditemukan! Mengalihkan...', 'success');
                    if (html5QrcodeScanner) {
                        await html5QrcodeScanner.stop();
                    }
                    // Use numeric ID from result.asset.id (safest for detail page operations)
                    const targetId = result.asset ? result.asset.id : assetId;
                    window.location.href = `detail-aset.html?id=${targetId}`;
                } else {
                    // Not found
                    showToast('Aset Tidak Ditemukan', 'error');
                    isProcessing = false; // Allow next scan
                }
            } catch (error) {
                console.error("Validation error", error);
                showToast(`Gagal memvalidasi: ${error.message}`, 'error');
                isProcessing = false;
            }
        }

        function onScanFailure(error) {
            // handle scan failure, usually better to ignore and keep scanning.
            // console.warn(`Code scan error = ${error}`);
        }

        // --- Manual Search Logic REMOVED ---
    </script>
</body>

</html>
