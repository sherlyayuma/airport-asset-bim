<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minangkabau Airport - Cetak QR</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style-mobile.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body class="dashboard-body">

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-brand">
            <div class="logo-circle">
                <img src="assets/logo-injourney.png" alt="Injourney Logo">
            </div>
            <div class="brand-text">
                <h3 style="color: #111827; font-size: 0.9rem; font-weight: 700;">Minangkabau <br> Airport</h3>
            </div>
        </div>

        <ul class="nav-links">
            <li>
                <a href="dashboard.html">
                    <i class="ph ph-squares-four"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="data-aset.html">
                    <i class="ph ph-cube"></i>
                    <span>Data Aset</span>
                </a>
            </li>
            <li>
                <a href="laporan-aset.html">
                    <i class="ph ph-file-text"></i>
                    <span>Laporan Aset</span>
                </a>
            </li>
            <li>
                <a href="laporan.html">
                    <i class="ph ph-scan"></i>
                    <span>Scan Aset</span>
                </a>
            </li>
            <li class="active">
                <a href="cetak-qr.html">
                    <i class="ph ph-qr-code"></i>
                    <span>Cetak QR</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <button id="logout-btn" class="logout-link">
                <i class="ph ph-sign-out"></i>
                <span>Logout</span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="top-header">
            <button id="menu-toggle" class="menu-toggle-btn">
                <i class="ph ph-list"></i>
            </button>
            <!-- Logo Area -->
            <div class="header-logos">
                <div class="logo-circle">
                    <img src="assets/logo-minangkabau.jpg" alt="Logo MIA">
                </div>
            </div>
            <div class="brand-text-container">
                <h2>Cetak Label Aset Bandara</h2>
                <p class="subtitle">Pilih aset untuk mengunduh label QR dalam format PDF siap cetak.</p>
            </div>
            <div class="header-right">
            </div>
        </header>

        <!-- Filter Section -->
        <div class="filter-bar card">
            <div class="search-input">
                <i class="ph ph-magnifying-glass"></i>
                <input type="text" placeholder="Cari Asset atau Description...">
            </div>
            <div class="filter-dropdowns" style="display: flex; gap: 12px; align-items: center;">
                <select id="filter-tipe" class="form-select">
                    <option value="all">Semua Tipe</option>
                    <option value="Asset Tetap">Asset Tetap</option>
                    <option value="Aset Dibiayakan">Aset Dibiayakan</option>
                    <option value="AUC">AUC</option>
                    <option value="Intangible Asset">Intangible Asset</option>
                </select>
                <select id="filter-lokasi" class="form-select">
                    <option value="all">Semua Lokasi</option>
                    <!-- Locations loaded dynamically -->
                </select>
                <div style="margin-left:auto; display: flex; gap: 8px;">

                    <button class="btn-primary" onclick="generateBulkPDF()" id="print-btn" disabled
                        style="opacity: 0.5; cursor: not-allowed;">
                        <i class="ph-bold ph-printer"></i>
                        <span>Cetak PDF (<span id="selected-count">0</span>)</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Asset Table -->
        <div class="table-section card no-padding">
            <table class="asset-table" id="asset-table">
                <thead>
                    <tr>
                        <th width="40"><input type="checkbox" id="select-all"></th>
                        <th width="50">NO</th>
                        <th>ASSET</th>
                        <th>ASSET DESCRIPTION</th>
                        <th>TIPE ASET</th>
                        <th>LOKASI</th>
                    </tr>
                </thead>
                <tbody id="asset-table-body">
                    <!-- Data will be loaded via JS -->
                    <tr>
                        <td colspan="6" class="text-center" style="padding: 32px; color: var(--text-secondary);">
                            <i class="ph ph-spinner ph-spin" style="font-size: 24px;"></i> Memuat data aset...
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="pagination">

                <div class="page-controls">
                    <!-- Pagination rendered by JS -->
                </div>
            </div>
        </div>

    </main>

    <!-- Hidden Print Container -->
    <div id="print-container" style="display: none;">
        <div class="qr-grid" id="qr-grid-content"
            style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px;">
            <!-- QR items injected here -->
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Auth Check
        const token = localStorage.getItem('token');
        if (!token) { /* redirect logic if needed */ }

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        });

        // State
        let currentPage = 1;
        const limit = 20; // More items per page since we want to select
        let allAssets = []; // We might need to fetch all for client-side functionality or assume server paginates
        // For simplicity, let's keep server pagination but maintain a "selectedIds" set across pages if possible, or just current page.
        // User request "Bulk" implies potentially many. 
        // Let's implement persistent selection set.
        let selectedAssets = new Map(); // id -> asset object

        // Elements
        const filterTipe = document.getElementById('filter-tipe');
        const filterLokasi = document.getElementById('filter-lokasi');
        const searchInput = document.querySelector('.search-input input');
        const tbody = document.getElementById('asset-table-body');
        const selectAllCheckbox = document.getElementById('select-all');
        const printBtn = document.getElementById('print-btn');
        const selectedCountSpan = document.getElementById('selected-count');

        // Initial Load
        document.addEventListener('DOMContentLoaded', () => {
            fetchLocations();
            fetchAssets();
        });

        // Events
        filterTipe.addEventListener('change', () => { resetSelection(); currentPage = 1; fetchAssets(); });
        filterLokasi.addEventListener('change', () => { resetSelection(); currentPage = 1; fetchAssets(); });
        let debounceTimer;
        searchInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => { resetSelection(); currentPage = 1; fetchAssets(); }, 500);
        });

        selectAllCheckbox.addEventListener('change', (e) => {
            const checkboxes = document.querySelectorAll('.row-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = e.target.checked;
                const assetData = JSON.parse(cb.dataset.asset);
                if (e.target.checked) {
                    selectedAssets.set(assetData.id, assetData);
                } else {
                    selectedAssets.delete(assetData.id);
                }
            });
            updateSelectionUI();
        });

        async function fetchLocations() {
            try {
                const response = await fetch('/api/locations', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = 'index.html';
                    return;
                }

                const result = await response.json();

                const select = document.getElementById('filter-lokasi');
                select.innerHTML = '<option value="all">Semua Lokasi</option>';

                if (result.success) {
                    result.locations.forEach(loc => {
                        const option = document.createElement('option');
                        option.value = loc.id; // Use ID
                        option.textContent = loc.nama_lokasi;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Failed to fetch locations', error);
                document.getElementById('filter-lokasi').innerHTML = '<option value="all">Error loading locations</option>';
            }
        }

        async function fetchAssets() {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center" style="padding: 32px;"><i class="ph ph-spinner ph-spin" style="font-size: 24px;"></i> Memuat data...</td></tr>`;

            const params = new URLSearchParams({
                page: currentPage,
                limit: limit
            });
            if (filterTipe.value !== 'all') params.append('tipe', filterTipe.value);
            if (filterLokasi.value !== 'all') {
                // Check if it's ID (numeric) or Name (predefined legacy) - Now we use IDs mostly
                // But backend handles both via 'lokasi' param logic in Asset.js?
                // Actually my Asset.js update uses 'location_id' param strictly for ID.
                // So I should send 'location_id' if numeric.
                const val = filterLokasi.value;
                if (!isNaN(val)) {
                    params.append('location_id', val);
                } else {
                    params.append('lokasi', val);
                }
            }
            if (searchInput.value) params.append('search', searchInput.value);

            try {
                const response = await fetch(`/api/assets?${params.toString()}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = 'index.html';
                    return;
                }

                const result = await response.json();

                if (result.success) {
                    renderTable(result.assets, (currentPage - 1) * limit);
                    // Simple pagination render (omitted specific implementation reuse for brevity, assuming standard)
                    // Re-using basic logic
                } else {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center">Gagal memuat data.</td></tr>`;
                }
            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="6" class="text-center">Error koneksi.</td></tr>`;
            }
        }

        function renderTable(assets, startIndex) {
            tbody.innerHTML = '';
            if (assets.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center">Data tidak ditemukan.</td></tr>`;
                return;
            }

            assets.forEach((asset, index) => {
                const tr = document.createElement('tr');
                const isSelected = selectedAssets.has(asset.id);

                tr.innerHTML = `
                    <td class="text-center">
                        <input type="checkbox" class="row-checkbox" 
                            data-asset='${JSON.stringify(asset).replace(/'/g, "&#39;")}'
                            ${isSelected ? 'checked' : ''}>
                    </td>
                    <td>${startIndex + index + 1}</td>
                    <td class="fw-bold">${asset.nama || '-'}</td>
                    <td>${asset.description || '-'}</td>
                    <td>${asset.tipe_aset || '-'}</td>
                    <td>${asset.lokasi || '-'}</td>
                `;
                tbody.appendChild(tr);

                // Individual Checkbox Event
                const checkbox = tr.querySelector('.row-checkbox');
                checkbox.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        selectedAssets.set(asset.id, asset);
                    } else {
                        selectedAssets.delete(asset.id);
                    }
                    updateSelectionUI();
                });
            });
            // Reset header checkbox state if needed based on partial selection
            // Omitted for simplicity
        }

        function updateSelectionUI() {
            const count = selectedAssets.size;
            selectedCountSpan.textContent = count;

            if (count > 0) {
                printBtn.disabled = false;
                printBtn.style.opacity = '1';
                printBtn.style.cursor = 'pointer';
            } else {
                printBtn.disabled = true;
                printBtn.style.opacity = '0.5';
                printBtn.style.cursor = 'not-allowed';
            }
        }

        function resetSelection() {
            selectedAssets.clear();
            selectAllCheckbox.checked = false;
            updateSelectionUI();
        }

        function generateBulkPDF() {
            if (selectedAssets.size === 0) return;

            const printContainer = document.getElementById('qr-grid-content');
            printContainer.innerHTML = ''; // Clear previous

            selectedAssets.forEach(asset => {
                const item = document.createElement('div');
                item.style.border = '1px solid #ddd';
                item.style.padding = '10px';
                item.style.borderRadius = '8px';
                item.style.display = 'flex';
                item.style.flexDirection = 'column';
                item.style.alignItems = 'center';
                item.style.textAlign = 'center';
                item.style.pageBreakInside = 'avoid'; // Avoid breaking inside QR card

                // Using backend stored QR images
                const qrUrl = `/api/assets/barcode/${asset.asset_id}`; // Use API directly

                item.innerHTML = `
                    <div style="font-size: 11px; color: #374151; margin-bottom: 4px; border-bottom: 1px solid #eee; padding-bottom: 4px; width: 100%;">
                        ${asset.description || '-'}
                    </div>
                    <div style="font-weight: 700; font-size: 13px; margin-bottom: 10px; color: #111827;">
                        ${asset.nama || '-'}
                    </div>
                    <div style="background: white; padding: 5px; border-radius: 4px; border: 1px solid #f3f4f6;">
                        <img src="${qrUrl}" style="width: 120px; height: 120px; object-fit: contain; display: block;">
                    </div>
                `;
                printContainer.appendChild(item);
            });

            // Trigger PDF
            const element = document.getElementById('print-container');
            element.style.display = 'block'; // Make visible for html2canvas

            const opt = {
                margin: 10,
                filename: 'QR_Assets_Internal.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(printContainer).save().then(() => {
                element.style.display = 'none'; // Hide again
            });
        }

    </script>
</body>

</html>
