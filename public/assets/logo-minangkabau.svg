<svg width="600" height="150" viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="150" fill="white"/>
  
  <!-- InJourney Flower Icon -->
  <g transform="translate(60, 75) scale(0.6)">
    <!-- Top Petal (Red) -->
    <path d="M-20,-40 C-20,-60 20,-60 20,-40 L20,0 C20,20 -20,20 -20,0 Z" fill="#E61E26"/>
    <!-- Right Petal (Orange) -->
    <path d="M40,-20 C60,-20 60,20 40,20 L0,20 C-20,20 -20,-20 0,-20 Z" fill="#F7941D"/>
    <!-- Bottom Petal (Green) -->
    <path d="M20,40 C20,60 -20,60 -20,40 L-20,0 C-20,-20 20,-20 20,0 Z" fill="#00A651"/>
    <!-- Left Petal (Blue) -->
    <path d="M-40,20 C-60,20 -60,-20 -40,-20 L0,-20 C20,-20 20,20 0,20 Z" fill="#0072BC"/>
  </g>

  <!-- Text Section -->
  <g transform="translate(130, 0)">
    <text x="0" y="65" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#333333">Minangkabau</text>
    <text x="0" y="105" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#555555">International Airport</text>
    <text x="0" y="135" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#777777">by injourney Airports</text>
  </g>
</svg>
